<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSH Hub - Session Player</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/asciinema-player@3.6.3/dist/bundle/asciinema-player.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }
        .header {
            background: #16213e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 {
            font-size: 1.3em;
            color: #00d9ff;
        }
        .header a {
            color: #00d9ff;
            text-decoration: none;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .session-list {
            margin-bottom: 30px;
        }
        .session-list h2 {
            margin-bottom: 15px;
            color: #00d9ff;
        }
        .session-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .session-card {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .session-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,217,255,0.2);
        }
        .session-card.active {
            border: 2px solid #00d9ff;
        }
        .session-card .title {
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }
        .session-card .meta {
            font-size: 0.85em;
            color: #888;
        }
        .session-card .meta span {
            margin-right: 15px;
        }
        .player-section {
            background: #0d0d0d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .player-section h3 {
            margin-bottom: 15px;
            color: #00d9ff;
        }
        #player-container {
            border-radius: 5px;
            overflow: hidden;
        }
        .no-session {
            text-align: center;
            padding: 60px;
            color: #666;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        .controls button {
            background: #0f3460;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .controls button:hover {
            background: #e94560;
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }
        .empty-state h3 {
            margin-bottom: 10px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SSH Hub - Session Player</h1>
        <div>
            <a href="/terminal">터미널</a> |
            <a href="/">대시보드</a>
        </div>
    </div>

    <div class="container">
        <div class="player-section" id="player-section" style="display: none;">
            <h3 id="current-session-title">세션 재생</h3>
            <div id="player-container"></div>
            <div class="controls">
                <button onclick="downloadSession()">다운로드</button>
                <button onclick="closePlayer()">닫기</button>
            </div>
        </div>

        <div class="session-list">
            <h2>녹화된 세션</h2>
            <div class="session-grid" id="session-grid">
                <div class="empty-state">
                    <h3>녹화된 세션이 없습니다</h3>
                    <p>웹 터미널로 접속하면 자동으로 녹화됩니다.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/asciinema-player@3.6.3/dist/bundle/asciinema-player.min.js"></script>
    <script>
        let currentSession = null;
        let player = null;

        // 세션 목록 로드
        async function loadSessions() {
            try {
                const res = await fetch('/api/recordings');
                const data = await res.json();

                const grid = document.getElementById('session-grid');

                if (data.sessions.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <h3>녹화된 세션이 없습니다</h3>
                            <p>웹 터미널로 접속하면 자동으로 녹화됩니다.</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = data.sessions.map(s => `
                    <div class="session-card" onclick="playSession('${s.id}')" id="card-${s.id}">
                        <div class="title">${s.server || 'Unknown'} - ${s.user || 'Unknown'}</div>
                        <div class="meta">
                            <span>${formatDate(s.created)}</span>
                            <span>${formatSize(s.size)}</span>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Failed to load sessions:', err);
            }
        }

        // 세션 재생
        async function playSession(sessionId) {
            // 기존 플레이어 정리
            if (player) {
                player.dispose();
                player = null;
            }

            // 카드 활성화 표시
            document.querySelectorAll('.session-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card-${sessionId}`)?.classList.add('active');

            currentSession = sessionId;
            document.getElementById('player-section').style.display = 'block';
            document.getElementById('current-session-title').textContent = `세션: ${sessionId}`;

            try {
                const container = document.getElementById('player-container');
                container.innerHTML = '';

                player = AsciinemaPlayer.create(
                    `/api/recordings/${sessionId}`,
                    container,
                    {
                        cols: 120,
                        rows: 40,
                        autoPlay: true,
                        theme: 'monokai',
                        fit: 'width',
                        fontSize: 'small'
                    }
                );
            } catch (err) {
                console.error('Failed to play session:', err);
                document.getElementById('player-container').innerHTML = `
                    <div style="padding: 20px; color: #f87171;">재생 오류: ${err.message}</div>
                `;
            }
        }

        // 세션 다운로드
        function downloadSession() {
            if (currentSession) {
                window.open(`/api/recordings/${currentSession}/download`, '_blank');
            }
        }

        // 플레이어 닫기
        function closePlayer() {
            if (player) {
                player.dispose();
                player = null;
            }
            document.getElementById('player-section').style.display = 'none';
            document.querySelectorAll('.session-card').forEach(c => c.classList.remove('active'));
            currentSession = null;
        }

        // 포맷터
        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleString('ko-KR');
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        }

        // 인증 확인 후 로드
        async function init() {
            const res = await fetch('/api/auth/me');
            const auth = await res.json();

            if (!auth.authenticated) {
                window.location.href = '/auth/login';
                return;
            }

            loadSessions();
        }

        init();
    </script>
</body>
</html>
